<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>RankKeeper · Dojo Wall</title><style>:root{--paper:#f4efe4;--card:#fff;--ink:#241f17;--soft:#6b6253;--line:#ddd3bf;--navy:#0b2545;--gold:#c8a032;--red:#c5443b;--green:#3e8e5a;--brown:#7b4b2a;--blue:#3566a8}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px system-ui,sans-serif}.hidden{display:none!important}.boot,.login{min-height:100vh;display:grid;place-items:center;padding:20px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:0 12px 40px #0b25451c}.login .card{width:min(380px,100%)}h1,h2,h3,p{margin:0}h1{font-size:20px;color:var(--navy)}h2{font-size:20px}h3{font-size:14px}.sub,.muted{color:var(--soft)}.sub{margin:5px 0 22px;font-size:12px;letter-spacing:.12em;text-transform:uppercase}.field{display:grid;gap:6px;margin:12px 0}label,.label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}input,select,textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font:inherit}textarea{min-height:80px}button{border:0;border-radius:8px;padding:9px 12px;background:var(--navy);color:#fff;font:700 13px inherit;cursor:pointer}button.secondary{background:#fff;color:var(--navy);border:1px solid var(--line)}button.danger{background:var(--red)}button.gold{background:var(--gold);color:var(--navy)}button:disabled{opacity:.55}.error{margin:12px 0;padding:9px 10px;background:#fbeae8;color:var(--red);border:1px solid var(--red);border-radius:8px}.top{background:var(--navy);border-bottom:3px solid var(--gold);color:#fff;padding:13px clamp(16px,4vw,32px);display:flex;align-items:center;justify-content:space-between;gap:15px}.brand{display:flex;gap:10px;align-items:center}.tiger{display:grid;place-items:center;width:34px;height:34px;border-radius:99px;background:var(--gold);color:var(--navy);font-weight:900}.top h1{color:#fff}.top small{color:#bbc6d4;letter-spacing:.14em;text-transform:uppercase}.wrap{max-width:1260px;margin:auto;padding:24px}.tabs{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap}.tab.accounts{background:var(--brown)}.tab.katas{background:var(--green)}.tab.ranks{background:var(--blue)}.tab.inactive{opacity:.52}.toolbar,.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}.toolbar{justify-content:space-between;margin:16px 0}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}.stat b{display:block;font-size:28px;color:var(--navy);margin-top:6px}.table-wrap{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:12px;text-align:left;border-bottom:1px solid #eee8dc;vertical-align:middle}th{color:var(--soft);font-size:11px;letter-spacing:.08em;text-transform:uppercase;background:#fbf8f1}.badge{display:inline-block;padding:3px 8px;border-radius:99px;background:#eee8dc;color:#5c513e;font-size:11px;font-weight:800}.badge.active,.dot.ok{background:#e3f3e8;color:#27683d}.badge.trial{background:#fff1cc;color:#896400}.badge.inactive,.dot.bad{background:#fbeae8;color:#9d302a}.level{padding:4px 7px;border-radius:6px;background:#edf2fa;color:#244e88;font-weight:700}.empty{padding:30px;text-align:center;color:var(--soft)}.detail{display:grid;gap:18px}.detailhead{display:flex;align-items:center;gap:14px}.avatar{display:grid;place-items:center;width:50px;height:50px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:900;font-size:19px}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.meta .card{padding:13px}.meta b{display:block;margin-top:5px}.split{display:grid;grid-template-columns:1fr 1fr;gap:15px}.modal{position:fixed;inset:0;background:#0b254566;display:grid;place-items:center;padding:18px;z-index:5}.modal .card{width:min(680px,100%);max-height:90vh;overflow:auto}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.toast{position:fixed;right:18px;bottom:18px;padding:12px 14px;background:var(--navy);color:#fff;border-radius:9px;box-shadow:0 6px 20px #0003;z-index:10}@media(max-width:720px){.stats,.meta,.split{grid-template-columns:1fr 1fr}.wrap{padding:16px}.top{align-items:flex-start}.top .right{display:none}}</style></head><body><main id="boot" class="boot">Checking secure session…</main><main id="login" class="login hidden"><section class="card"><div class="tiger">虎</div><h1 style="margin-top:12px">RankKeeper Admin</h1><p class="sub">Dojo Wall</p><div id="login-error" class="error hidden"></div><form id="login-form"><div class="field"><label>Email</label><input id="email" type="email" required autocomplete="username"/></div><div class="field"><label>Password</label><input id="password" type="password" required autocomplete="current-password"/></div><button id="login-submit" class="gold" type="submit">Sign In</button></form></section></main><main id="app" class="hidden"><header class="top"><div class="brand"><div class="tiger">虎</div><div><h1>RankKeeper</h1><small>Dojo Wall · Admin Console</small></div></div><div class="right"><span id="admin-email"></span> <button id="signout" class="secondary">Sign out</button></div></header><div class="wrap"><nav class="tabs"><button data-tab="accounts" class="tab accounts">Dojo Accounts</button><button data-tab="katas" class="tab katas inactive">Kata Library</button><button data-tab="ranks" class="tab ranks inactive">Rank Systems</button></nav><section id="accounts-view"></section><section id="katas-view" class="hidden"></section><section id="ranks-view" class="hidden"></section></div></main><div id="modal-root"></div><div id="toast" class="toast hidden"></div><script type="module" src="/src/admin.js"></script></body></html>
